version: '3.8'

networks:
  tienda_network:
    driver: bridge

volumes:
  # Volumen nombrado para la BD SQLite — Docker gestiona los permisos
  # correctamente y appuser puede escribir sin problemas.
  sqlite_data:

services:
  backend:
    build: ./backend
    container_name: tienda_backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      # Solo montamos la carpeta de la BD, NO todo /app.
      # Montar ./backend:/app sobreescribía los permisos del chown del Dockerfile.
      - sqlite_data:/app/instance
    networks:
      - tienda_network

  frontend:
    build: ./frontend
    container_name: tienda_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - tienda_network
