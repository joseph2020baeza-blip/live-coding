version: '3.8'

networks:
  tienda_network:
    driver: bridge

services:
  backend:
    build: ./backend
    container_name: tienda_backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    networks:
      - tienda_network

  frontend:
    build: ./frontend
    container_name: tienda_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - tienda_network
